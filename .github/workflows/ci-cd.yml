name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/sharmapavani/agenticarchitect-backend
  FRONTEND_IMAGE: ghcr.io/sharmapavani/agenticarchitect-frontend

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            backend:
              - 'multiagentchat/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'

  frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: multiagentchat/requirements-docker.txt

      - name: Install dependencies
        run: |
          pip install -r multiagentchat/requirements-docker.txt
          pip install --no-deps -e multiagentchat/

      - name: Compile Python sources
        run: python -m compileall multiagentchat/src/multiagentchat

      - name: Smoke import check
        run: python -c "from multiagentchat.api.app import app; assert app is not None"

  docker-publish:
    needs: [detect-changes, frontend, backend]
    if: |
      always() &&
      !cancelled() &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.backend.result == 'success') &&
      github.repository == 'sharmapavani/AgenticArchitect' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./multiagentchat
          file: ./multiagentchat/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Post-publish smoke — backend health
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.BACKEND_IMAGE }}:sha-${SHORT_SHA}"

          docker pull "$IMAGE"
          docker run -d --name backend-smoke \
            -e CHAT_AUDIT_ENABLED=1 \
            -e CHAT_AUDIT_AUTO_INIT=1 \
            -e OTEL_ENABLED=0 \
            "$IMAGE"

          echo "Waiting for backend health..."
          for i in $(seq 1 30); do
            if docker exec backend-smoke curl -sf http://localhost:8000/health; then
              echo "Backend health OK"
              break
            fi
            if [ "$i" -eq 30 ]; then
              docker logs backend-smoke
              exit 1
            fi
            sleep 5
          done

      - name: Post-publish smoke — frontend proxy health
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}:sha-${SHORT_SHA}"
          FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}:sha-${SHORT_SHA}"

          docker network create smoke-net

          docker run -d --name backend-smoke-fe \
            --network smoke-net \
            --network-alias backend \
            -e CHAT_AUDIT_ENABLED=1 \
            -e CHAT_AUDIT_AUTO_INIT=1 \
            -e OTEL_ENABLED=0 \
            "$BACKEND_IMAGE"

          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if docker exec backend-smoke-fe curl -sf http://localhost:8000/health; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              docker logs backend-smoke-fe
              exit 1
            fi
            sleep 5
          done

          docker run -d --name frontend-smoke \
            --network smoke-net \
            -p 3000:3000 \
            -e BACKEND_URL=http://backend:8000 \
            "$FRONTEND_IMAGE"

          echo "Waiting for frontend proxy health..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Frontend proxy health OK"
              exit 0
            fi
            sleep 3
          done

          docker logs frontend-smoke
          exit 1

      - name: Cleanup smoke containers
        if: always()
        run: |
          docker rm -f backend-smoke backend-smoke-fe frontend-smoke 2>/dev/null || true
          docker network rm smoke-net 2>/dev/null || true
