services:
  backend:
    build:
      context: ./multiagentchat
      dockerfile: Dockerfile
    env_file:
      - ./multiagentchat/.env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      CHROMA_PATH: ".chroma"
      CHAT_AUDIT_DB_PATH: "./data/chat_audit.db"
    volumes:
      - chroma-data:/app/.chroma
      - audit-data:/app/data
      - ./multiagentchat/knowledge:/app/knowledge:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: "http://backend:8000"
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  otel-collector:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./multiagentchat/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"
      - "8889:8889"

  jaeger:
    profiles: [observability]
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.51.0
    volumes:
      - ./multiagentchat/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    profiles: [observability]
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./multiagentchat/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./multiagentchat/docker/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  chroma-data:
  audit-data:
